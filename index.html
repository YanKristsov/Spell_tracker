
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трекеры · без иконок + сброс</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc;
            color: #334155;
            line-height: 1.5;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tracker-wrapper {
            width: 100%;
            max-width: 560px;
            margin-bottom: 25px;
        }

        .container, .spell-container {
            width: 100%;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            padding: 18px 15px;
            overflow-x: auto;
        }

        h1, h2 {
            color: #475569;
            font-size: 22px;
            margin-bottom: 12px;
            display: inline-block;
            padding-bottom: 8px;
            border-bottom: 2px solid #cbd5e1;
            width: 100%;
            text-align: center;
            font-weight: 600;
        }

        h2 {
            font-size: 20px;
            margin-top: 5px;
        }

        /* стили для таблицы (полностью из оригинала) */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
            min-width: 400px;
        }

        th, td {
            padding: 10px 8px;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background-color: #f1f5f9;
            color: #475569;
            font-weight: 600;
            border-bottom: 2px solid #cbd5e1;
            font-size: 14px;
        }

        .text-cell {
            width: 100%;
            min-height: 35px;
            max-height: 120px;
            padding: 6px 8px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            resize: vertical;
            font-family: inherit;
            font-size: 13px;
            background-color: #fff;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            overflow-y: auto;
        }

        .text-cell:focus {
            outline: none;
            border-color: #94a3b8;
            box-shadow: 0 0 0 2px rgba(148, 163, 184, 0.2);
        }

        .checkbox-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .circle-checkbox {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #94a3b8;
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .circle-checkbox.checked {
            background-color: #94a3b8;
            border-color: #64748b;
        }

        .circle-checkbox.checked::after {
            content: "✓";
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        .circle-checkbox:hover {
            border-color: #64748b;
            transform: scale(1.05);
        }

        tr:hover {
            background-color: #f8fafc;
        }

        /* НОВЫЙ ТРЕКЕР — без иконок в заголовках */
        .spell-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 8px;
        }

        .circle-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            overflow: hidden;
        }

        .circle-header {
            background-color: #f1f5f9;
            padding: 10px 14px;
            font-weight: 600;
            font-size: 15px;
            color: #475569;
            border-bottom: 1px solid #cbd5e1;
            /* иконки удалены — не добавляем i */
        }

        .spells-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 18px;
            padding: 16px 18px;
            align-items: center;
        }

        .spell-item {
            display: flex;
            align-items: center;
            gap: 6px;
            background: transparent;
            border: none;
            padding: 0;
        }

        .slot-group {
            display: flex;
            gap: 6px;
        }

        .slot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #94a3b8;
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 12px;
            color: white;
        }

        .slot.checked {
            background-color: #94a3b8;
            border-color: #64748b;
        }

        .slot.checked::after {
            content: "✓";
            color: white;
            font-size: 11px;
            font-weight: bold;
        }

        .slot:hover {
            border-color: #64748b;
            transform: scale(1.05);
        }

        .healing-section {
            background-color: #f8fafc;
            padding: 12px 16px 16px 16px;
        }

        .healing-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 18px;
        }

        /* футер с кнопками */
        .footer-control {
            margin-top: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #64748b;
            font-size: 13px;
            border-top: 1px dashed #cbd5e1;
            padding-top: 14px;
            flex-wrap: wrap;
        }

        .reset-btn {
            background: #fff;
            border: 1px solid #94a3b8;
            border-radius: 20px;
            padding: 6px 18px;
            font-size: 13px;
            cursor: pointer;
            color: #475569;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            background-color: #f1f5f9;
            border-color: #64748b;
        }

        .instructions {
            margin-top: 12px;
            font-size: 13px;
            color: #64748b;
            text-align: center;
        }

        @media (max-width: 500px) {
            .container, .spell-container { padding: 12px; }
            table { min-width: 350px; }
        }
    </style>
</head>
<body>
    <!-- НОВЫЙ ТРЕКЕР (БЕЗ ИКОНОК В ЗАГОЛОВКАХ) -->
    <div class="tracker-wrapper">
        <div class="spell-container">
            <h2><i class="fas fa-magic"></i> Ячейки заклинаний (круги 1–9 + фокусы)</h2>
            <div class="spell-grid" id="spellTracker"></div>
            <div class="footer-control">
                <span><i class="far fa-circle"></i> доступна · <i class="fas fa-check-circle" style="color:#475569;"></i> использована</span>
                <button class="reset-btn" id="resetSpellBtn"><i class="fas fa-undo-alt"></i> Сбросить</button>
            </div>
        </div>
    </div>

    <!-- ПРОШЛЫЙ ТРЕКЕР (ТАБЛИЦА) + ДОБАВЛЕНА КНОПКА СБРОСА -->
    <div class="tracker-wrapper">
        <div class="container">
            <h1><i class="fas fa-table"></i> Таблица способностей</h1>
            <table>
                <thead>
                    <tr><th></th><th colspan="6">Минута</th></tr>
                </thead>
                <tbody>
                    <tr>
                        <td><textarea class="text-cell" placeholder="Введите текст (до 25)" maxlength="25"></textarea></td>
                        <td><div class="checkbox-container"><div class="circle-checkbox"></div></div></td>
                        <td><div class="checkbox-container"><div class="circle-checkbox"></div></div></td>
                        <td><div class="checkbox-container"><div class="circle-checkbox"></div></div></td>
                        <td><div class="checkbox-container"><div class="circle-checkbox"></div></div></td>
                        <td><div class="checkbox-container"><div class="circle-checkbox"></div></div></td>
                        <td><div class="checkbox-container"><div class="circle-checkbox"></div></div></td>
                    </tr>
                    <tr>
                        <td><textarea class="text-cell" placeholder="Введите текст (до 25)" maxlength="25"></textarea></td>
                        <td><div class="checkbox-container"><div class="circle-checkbox"></div></div></td>
                        <td><div class="checkbox-container"><div class="circle-checkbox"></div></div></td>
                        <td><div class="checkbox-container"><div class="circle-checkbox"></div></div></td>
                        <td><div class="checkbox-container"><div class="circle-checkbox"></div></div></td>
                        <td><div class="checkbox-container"><div class="circle-checkbox"></div></div></td>
                        <td><div class="checkbox-container"><div class="circle-checkbox"></div></div></td>
                    </tr>
                    <tr>
                        <td><textarea class="text-cell" placeholder="Введите текст (до 25)" maxlength="25"></textarea></td>
                        <td><div class="checkbox-container"><div class="circle-checkbox"></div></div></td>
                        <td><div class="checkbox-container"><div class="circle-checkbox"></div></div></td>
                        <td><div class="checkbox-container"><div class="circle-checkbox"></div></div></td>
                        <td><div class="checkbox-container"><div class="circle-checkbox"></div></div></td>
                        <td><div class="checkbox-container"><div class="circle-checkbox"></div></div></td>
                        <td><div class="checkbox-container"><div class="circle-checkbox"></div></div></td>
                    </tr>
                    <tr>
                        <td><textarea class="text-cell" placeholder="Введите текст (до 25)" maxlength="25"></textarea></td>
                        <td><div class="checkbox-container"><div class="circle-checkbox"></div></div></td>
                        <td><div class="checkbox-container"><div class="circle-checkbox"></div></div></td>
                        <td><div class="checkbox-container"><div class="circle-checkbox"></div></div></td>
                        <td><div class="checkbox-container"><div class="circle-checkbox"></div></div></td>
                        <td><div class="checkbox-container"><div class="circle-checkbox"></div></div></td>
                        <td><div class="checkbox-container"><div class="circle-checkbox"></div></div></td>
                    </tr>
                    <tr>
                        <td><textarea class="text-cell" placeholder="Введите текст (до 25)" maxlength="25"></textarea></td>
                        <td><div class="checkbox-container"><div class="circle-checkbox"></div></div></td>
                        <td><div class="checkbox-container"><div class="circle-checkbox"></div></div></td>
                        <td><div class="checkbox-container"><div class="circle-checkbox"></div></div></td>
                        <td><div class="checkbox-container"><div class="circle-checkbox"></div></div></td>
                        <td><div class="checkbox-container"><div class="circle-checkbox"></div></div></td>
                        <td><div class="checkbox-container"><div class="circle-checkbox"></div></div></td>
                    </tr>
                </tbody>
            </table>
            <div class="footer-control" style="margin-top:20px;">
                <span></span> <!-- пустой span для выравнивания -->
                <button class="reset-btn" id="resetTableBtn"><i class="fas fa-undo-alt"></i> Сбросить таблицу</button>
            </div>
            <div class="instructions">
                <p><i class="fas fa-info-circle"></i> Нажмите на поля для текста и на кружки для отметки</p>
            </div>
        </div>
    </div>

<script>
    (function() {
        // Ключи для localStorage
        const STORAGE_SPELLS = 'trackerSpells';
        const STORAGE_TABLE_CHECKBOXES = 'trackerTableCheckboxes';
        const STORAGE_TABLE_TEXTS = 'trackerTableTexts';

        // ========== ФУНКЦИИ СОХРАНЕНИЯ И ЗАГРУЗКИ ==========
        
        // Сохраняет состояние ВСЕХ слотов заклинаний
        function saveSpellSlots() {
            const slots = [];
            document.querySelectorAll('#spellTracker .slot').forEach((slot, index) => {
                slots.push({
                    index: index,
                    checked: slot.classList.contains('checked')
                });
            });
            localStorage.setItem(STORAGE_SPELLS, JSON.stringify(slots));
        }

        // Загружает состояние слотов заклинаний
        function loadSpellSlots() {
            const saved = localStorage.getItem(STORAGE_SPELLS);
            if (!saved) return;
            try {
                const slots = JSON.parse(saved);
                const allSlots = document.querySelectorAll('#spellTracker .slot');
                slots.forEach(item => {
                    if (item.index < allSlots.length && item.checked) {
                        allSlots[item.index].classList.add('checked');
                    }
                });
            } catch (e) {
                console.error('Ошибка загрузки слотов:', e);
            }
        }

        // Сохраняет состояние галочек в таблице
        function saveTableCheckboxes() {
            const checkboxes = [];
            document.querySelectorAll('.container .circle-checkbox').forEach((cb, index) => {
                checkboxes.push({
                    index: index,
                    checked: cb.classList.contains('checked')
                });
            });
            localStorage.setItem(STORAGE_TABLE_CHECKBOXES, JSON.stringify(checkboxes));
        }

        // Загружает состояние галочек в таблице
        function loadTableCheckboxes() {
            const saved = localStorage.getItem(STORAGE_TABLE_CHECKBOXES);
            if (!saved) return;
            try {
                const checkboxes = JSON.parse(saved);
                const allCb = document.querySelectorAll('.container .circle-checkbox');
                checkboxes.forEach(item => {
                    if (item.index < allCb.length && item.checked) {
                        allCb[item.index].classList.add('checked');
                    }
                });
            } catch (e) {
                console.error('Ошибка загрузки галочек таблицы:', e);
            }
        }

        // Сохраняет текст из всех textarea в таблице
        function saveTableTexts() {
            const texts = [];
            document.querySelectorAll('.container .text-cell').forEach((ta, index) => {
                texts.push({
                    index: index,
                    value: ta.value
                });
            });
            localStorage.setItem(STORAGE_TABLE_TEXTS, JSON.stringify(texts));
        }

        // Загружает текст в textarea таблицы
        function loadTableTexts() {
            const saved = localStorage.getItem(STORAGE_TABLE_TEXTS);
            if (!saved) return;
            try {
                const texts = JSON.parse(saved);
                const allTa = document.querySelectorAll('.container .text-cell');
                texts.forEach(item => {
                    if (item.index < allTa.length) {
                        allTa[item.index].value = item.value;
                        // Подгоняем высоту
                        allTa[item.index].style.height = 'auto';
                        allTa[item.index].style.height = allTa[item.index].scrollHeight + 'px';
                    }
                });
            } catch (e) {
                console.error('Ошибка загрузки текста таблицы:', e);
            }
        }

        // Сохраняет ВСЁ
        function saveAll() {
            saveSpellSlots();
            saveTableCheckboxes();
            saveTableTexts();
        }

        // Загружает ВСЁ
        function loadAll() {
            loadSpellSlots();
            loadTableCheckboxes();
            loadTableTexts();
        }

        // ========== ПОСТРОЕНИЕ ТРЕКЕРА ЗАКЛИНАНИЙ ==========
        const circlesData = [];

        // 1. Фокусировка
        circlesData.push({
            title: 'Фокусировка',
            spells: [{ slots: 1 }, { slots: 1 }]
        });

        // 2. Круги 1..8
        for (let circle = 1; circle <= 8; circle++) {
            const spells = [];
            for (let s = 1; s <= 3; s++) spells.push({ slots: 1 });
            circlesData.push({ title: `Круг ${circle}`, spells: spells });
        }

        // 3. Круг 9
        circlesData.push({
            title: 'Круг 9',
            spells: [{ slots: 1 }, { slots: 1 }]
        });

        const spellContainer = document.getElementById('spellTracker');
        if (spellContainer) {
            function buildSpellTracker() {
                spellContainer.innerHTML = '';

                circlesData.forEach(circle => {
                    const card = document.createElement('div');
                    card.className = 'circle-card';

                    const header = document.createElement('div');
                    header.className = 'circle-header';
                    header.textContent = circle.title;
                    card.appendChild(header);

                    const row = document.createElement('div');
                    row.className = 'spells-row';

                    circle.spells.forEach(spell => {
                        const spellDiv = document.createElement('div');
                        spellDiv.className = 'spell-item';

                        const slotGroup = document.createElement('div');
                        slotGroup.className = 'slot-group';

                        for (let i = 0; i < spell.slots; i++) {
                            const slot = document.createElement('div');
                            slot.className = 'slot';
                            
                            // При клике: переключаем класс и СОХРАНЯЕМ
                            slot.addEventListener('click', function(e) {
                                e.stopPropagation();
                                this.classList.toggle('checked');
                                saveAll(); // <-- СОХРАНЕНИЕ
                            });
                            
                            slotGroup.appendChild(slot);
                        }

                        spellDiv.appendChild(slotGroup);
                        row.appendChild(spellDiv);
                    });

                    card.appendChild(row);
                    spellContainer.appendChild(card);
                });

                // Исцеление
                const healCard = document.createElement('div');
                healCard.className = 'circle-card';
                const healHeader = document.createElement('div');
                healHeader.className = 'circle-header';
                healHeader.textContent = 'Исцеление (круг 9)';
                healCard.appendChild(healHeader);

                const healInner = document.createElement('div');
                healInner.className = 'healing-section';
                const healGrid = document.createElement('div');
                healGrid.className = 'healing-grid';

                for (let h = 1; h <= 7; h++) {
                    const spellDiv = document.createElement('div');
                    spellDiv.className = 'spell-item';
                    const slotGroup = document.createElement('div');
                    slotGroup.className = 'slot-group';
                    const slot = document.createElement('div');
                    slot.className = 'slot';
                    
                    slot.addEventListener('click', function(e) {
                        e.stopPropagation();
                        this.classList.toggle('checked');
                        saveAll(); // <-- СОХРАНЕНИЕ
                    });
                    
                    slotGroup.appendChild(slot);
                    spellDiv.appendChild(slotGroup);
                    healGrid.appendChild(spellDiv);
                }

                healInner.appendChild(healGrid);
                healCard.appendChild(healInner);
                spellContainer.appendChild(healCard);
            }

            buildSpellTracker();

            // Кнопка сброса для заклинаний
            document.getElementById('resetSpellBtn')?.addEventListener('click', function() {
                document.querySelectorAll('#spellTracker .slot').forEach(slot => {
                    slot.classList.remove('checked');
                });
                saveAll(); // <-- СОХРАНЯЕМ ПОСЛЕ СБРОСА
            });
        }

        // ========== ТАБЛИЦА ==========
        const tableCheckboxes = document.querySelectorAll('.container .circle-checkbox');
        const tableTextareas = document.querySelectorAll('.container .text-cell');

        // Галочки в таблице
        tableCheckboxes.forEach(cb => {
            cb.addEventListener('click', function() {
                this.classList.toggle('checked');
                saveAll(); // <-- СОХРАНЕНИЕ
            });
        });

        // Текстовые поля в таблице
        tableTextareas.forEach(ta => {
            ta.style.height = '35px';
            ta.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
                saveAll(); // <-- СОХРАНЕНИЕ ПРИ ВВОДЕ
            });
        });

        // Кнопка сброса таблицы
        document.getElementById('resetTableBtn')?.addEventListener('click', function() {
            tableCheckboxes.forEach(cb => cb.classList.remove('checked'));
            tableTextareas.forEach(ta => {
                ta.value = '';
                ta.style.height = '35px';
            });
            saveAll(); // <-- СОХРАНЯЕМ ПОСЛЕ СБРОСА
        });

        // ========== ЗАГРУЗКА ПРИ СТАРТЕ ==========
        loadAll();

    })();
</script>
</body>
</html>
