<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трекеры · управление ячейками</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc;
            color: #334155;
            line-height: 1.5;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tracker-wrapper {
            width: 100%;
            max-width: 560px;
            margin-bottom: 30px;
        }

        /* общие стили карточек блоков */
        .block-card {
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            transition: box-shadow 0.2s;
        }

        /* шапка блока: заголовок + кнопка сброса в одной строке */
        .block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #ffffff;
            padding: 16px 20px 8px 20px;
            border-bottom: 1px solid #eef2f6;
            flex-wrap: wrap;
            gap: 12px;
        }
        .block-header h1, 
        .block-header h2 {
            margin: 0;
            padding: 0;
            border: none;
            text-align: left;
            font-size: 1.4rem;
            font-weight: 600;
            color: #1e293b;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: none;
            width: auto;
        }
        .block-header h2 {
            font-size: 1.25rem;
        }
        .reset-btn-top {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            color: #1e293b;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }
        .reset-btn-top:hover {
            background-color: #e2e8f0;
            border-color: #94a3b8;
            transform: scale(0.97);
        }

        /* контент внутри карточки */
        .block-content {
            padding: 10px 20px 20px 20px;
        }

        /* таблица способностей */
        .ability-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 4px;
        }
        .ability-table th, 
        .ability-table td {
            padding: 10px 6px;
            text-align: center;
            border-bottom: 1px solid #e9edf2;
        }
        .ability-table th {
            background-color: #f8fafc;
            color: #334155;
            font-weight: 600;
            font-size: 0.85rem;
            border-bottom: 2px solid #dce3ec;
        }
        .text-cell {
            width: 100%;
            min-height: 38px;
            padding: 8px 10px;
            border: 1px solid #cbd5e6;
            border-radius: 12px;
            resize: vertical;
            font-family: inherit;
            font-size: 0.85rem;
            background-color: #fff;
            transition: 0.15s;
            line-height: 1.4;
        }
        .text-cell:focus {
            outline: none;
            border-color: #8192aa;
            box-shadow: 0 0 0 2px rgba(100, 116, 139, 0.2);
        }
        .checkbox-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .circle-checkbox {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid #94a3b8;
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .circle-checkbox.checked {
            background-color: #94a3b8;
            border-color: #64748b;
        }
        .circle-checkbox.checked::after {
            content: "✓";
            color: white;
            font-size: 13px;
            font-weight: bold;
        }
        .circle-checkbox:hover {
            border-color: #4b5563;
            transform: scale(1.05);
        }

        /* трекер заклинаний: сетка с кругами */
        .spell-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 6px;
        }
        .circle-card {
            background: #ffffff;
            border: 1px solid #ecf3f9;
            border-radius: 18px;
            overflow: hidden;
            transition: 0.1s;
        }
        .circle-header {
            background-color: #f9fbfd;
            padding: 10px 16px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #1e293b;
            border-bottom: 1px solid #e9edf2;
        }
        .spells-row {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            padding: 14px 18px;
            align-items: center;
        }
        .spell-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .slot-group {
            display: flex;
            gap: 8px;
        }
        .slot {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 2px solid #94a3b8;
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.15s;
        }
        .slot.checked {
            background-color: #94a3b8;
            border-color: #64748b;
        }
        .slot.checked::after {
            content: "✓";
            color: white;
            font-size: 13px;
            font-weight: bold;
        }
        .slot:hover {
            border-color: #4b5563;
            transform: scale(1.05);
        }
        .healing-section {
            background-color: #fefcf5;
            padding: 12px 18px 18px 18px;
        }
        .healing-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }

        /* убираем старый футер и лишние подсказки */
        .no-legend {
            display: none;
        }

        @media (max-width: 520px) {
            .block-content { padding: 12px 16px; }
            .slot { width: 24px; height: 24px; }
        }
    </style>
</head>
<body>

    <!-- БЛОК 1: Ячейки заклинаний (круги 1–9 + фокусы) -->
    <div class="tracker-wrapper">
        <div class="block-card">
            <div class="block-header">
                <h2><i class="fas fa-magic"></i> Ячейки заклинаний</h2>
                <button class="reset-btn-top" id="resetSpellBtnTop"><i class="fas fa-undo-alt"></i> Сбросить всё</button>
            </div>
            <div class="block-content">
                <div id="spellTracker" class="spell-grid"></div>
                <!-- полностью убрана строка с легендой "доступна/использована" -->
            </div>
        </div>
    </div>

    <!-- БЛОК 2: Таблица способностей (с кнопкой сброса в шапке) -->
    <div class="tracker-wrapper">
        <div class="block-card">
            <div class="block-header">
                <h1><i class="fas fa-table"></i> Таблица способностей</h1>
                <button class="reset-btn-top" id="resetTableBtnTop"><i class="fas fa-undo-alt"></i> Сбросить всё</button>
            </div>
            <div class="block-content">
                <table class="ability-table">
                    <thead>
                        <tr><th></th><th colspan="6">Минута</th></tr>
                    </thead>
                    <tbody id="tableDynamicBody">
                        <!-- строки таблицы будут сгенерированы через JS, чтобы удобно управлять -->
                    </tbody>
                </table>
                <!-- удалены инструкции "Нажмите на поля..." и футер с лишним текстом -->
            </div>
        </div>
    </div>

<script>
    (function() {
        // Ключи для localStorage
        const STORAGE_SPELLS = 'trackerSpells_clean';
        const STORAGE_TABLE_CHECKBOXES = 'trackerTableCheckboxes_clean';
        const STORAGE_TABLE_TEXTS = 'trackerTableTexts_clean';

        // ---------- 1. ПОСТРОЕНИЕ ТАБЛИЦЫ (5 строк, 6 колонок) ----------
        const tableBody = document.getElementById('tableDynamicBody');
        const ROWS_COUNT = 5;
        const COLS_COUNT = 6;

        function buildTableHTML() {
            let html = '';
            for (let r = 0; r < ROWS_COUNT; r++) {
                html += '<tr>';
                // текстовая ячейка
                html += `<td><textarea class="text-cell" placeholder="Введите текст (до 25)" maxlength="25" rows="1"></textarea></td>`;
                // чекбоксы-кружки
                for (let c = 0; c < COLS_COUNT; c++) {
                    html += `<td><div class="checkbox-container"><div class="circle-checkbox"></div></div></td>`;
                }
                html += '</tr>';
            }
            tableBody.innerHTML = html;
        }
        buildTableHTML();

        // получаем элементы таблицы после генерации
        let tableCheckboxes = [];
        let tableTextareas = [];

        function refreshTableElements() {
            tableCheckboxes = Array.from(document.querySelectorAll('.block-card .circle-checkbox'));
            tableTextareas = Array.from(document.querySelectorAll('.block-card .text-cell'));
        }
        refreshTableElements();

        // ---------- 2. ПОСТРОЕНИЕ ТРЕКЕРА ЗАКЛИНАНИЙ (круги + исцеление) ----------
        const circlesData = [];

        // Фокусировка (2 слота)
        circlesData.push({ title: 'Фокусировка', spells: [{ slots: 1 }, { slots: 1 }] });

        // Круги 1..8 по 3 ячейки
        for (let circle = 1; circle <= 8; circle++) {
            const spells = [];
            for (let s = 1; s <= 3; s++) spells.push({ slots: 1 });
            circlesData.push({ title: `Круг ${circle}`, spells: spells });
        }

        // Круг 9 (2 ячейки)
        circlesData.push({ title: 'Круг 9', spells: [{ slots: 1 }, { slots: 1 }] });

        const spellContainer = document.getElementById('spellTracker');
        
        function buildSpellTracker() {
            if (!spellContainer) return;
            spellContainer.innerHTML = '';

            // основные круги
            circlesData.forEach(circle => {
                const card = document.createElement('div');
                card.className = 'circle-card';

                const header = document.createElement('div');
                header.className = 'circle-header';
                header.textContent = circle.title;
                card.appendChild(header);

                const row = document.createElement('div');
                row.className = 'spells-row';

                circle.spells.forEach(spell => {
                    const spellDiv = document.createElement('div');
                    spellDiv.className = 'spell-item';
                    const slotGroup = document.createElement('div');
                    slotGroup.className = 'slot-group';
                    for (let i = 0; i < spell.slots; i++) {
                        const slot = document.createElement('div');
                        slot.className = 'slot';
                        slot.addEventListener('click', function(e) {
                            e.stopPropagation();
                            this.classList.toggle('checked');
                            saveAll();
                        });
                        slotGroup.appendChild(slot);
                    }
                    spellDiv.appendChild(slotGroup);
                    row.appendChild(spellDiv);
                });
                card.appendChild(row);
                spellContainer.appendChild(card);
            });

            // блок Исцеление (круг 9) - 7 слотов
            const healCard = document.createElement('div');
            healCard.className = 'circle-card';
            const healHeader = document.createElement('div');
            healHeader.className = 'circle-header';
            healHeader.textContent = 'Исцеление (круг 9)';
            healCard.appendChild(healHeader);
            const healInner = document.createElement('div');
            healInner.className = 'healing-section';
            const healGrid = document.createElement('div');
            healGrid.className = 'healing-grid';
            for (let h = 1; h <= 7; h++) {
                const spellDiv = document.createElement('div');
                spellDiv.className = 'spell-item';
                const slotGroup = document.createElement('div');
                slotGroup.className = 'slot-group';
                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.addEventListener('click', function(e) {
                    e.stopPropagation();
                    this.classList.toggle('checked');
                    saveAll();
                });
                slotGroup.appendChild(slot);
                spellDiv.appendChild(slotGroup);
                healGrid.appendChild(spellDiv);
            }
            healInner.appendChild(healGrid);
            healCard.appendChild(healInner);
            spellContainer.appendChild(healCard);
        }

        buildSpellTracker();

        // ---------- 3. ФУНКЦИИ СОХРАНЕНИЯ / ЗАГРУЗКИ ----------
        function saveSpellSlots() {
            const slots = [];
            document.querySelectorAll('#spellTracker .slot').forEach((slot, idx) => {
                slots.push({ index: idx, checked: slot.classList.contains('checked') });
            });
            localStorage.setItem(STORAGE_SPELLS, JSON.stringify(slots));
        }

        function loadSpellSlots() {
            const saved = localStorage.getItem(STORAGE_SPELLS);
            if (!saved) return;
            try {
                const slotsData = JSON.parse(saved);
                const allSlots = document.querySelectorAll('#spellTracker .slot');
                slotsData.forEach(item => {
                    if (item.index < allSlots.length && item.checked) {
                        allSlots[item.index].classList.add('checked');
                    } else if (item.index < allSlots.length && !item.checked) {
                        allSlots[item.index].classList.remove('checked');
                    }
                });
            } catch(e) { console.warn(e); }
        }

        function saveTableCheckboxes() {
            const checkboxes = [];
            tableCheckboxes.forEach((cb, idx) => {
                checkboxes.push({ index: idx, checked: cb.classList.contains('checked') });
            });
            localStorage.setItem(STORAGE_TABLE_CHECKBOXES, JSON.stringify(checkboxes));
        }

        function loadTableCheckboxes() {
            const saved = localStorage.getItem(STORAGE_TABLE_CHECKBOXES);
            if (!saved) return;
            try {
                const cbData = JSON.parse(saved);
                cbData.forEach(item => {
                    if (item.index < tableCheckboxes.length) {
                        if (item.checked) tableCheckboxes[item.index].classList.add('checked');
                        else tableCheckboxes[item.index].classList.remove('checked');
                    }
                });
            } catch(e) { console.warn(e); }
        }

        function saveTableTexts() {
            const texts = [];
            tableTextareas.forEach((ta, idx) => {
                texts.push({ index: idx, value: ta.value });
            });
            localStorage.setItem(STORAGE_TABLE_TEXTS, JSON.stringify(texts));
        }

        function loadTableTexts() {
            const saved = localStorage.getItem(STORAGE_TABLE_TEXTS);
            if (!saved) return;
            try {
                const textData = JSON.parse(saved);
                textData.forEach(item => {
                    if (item.index < tableTextareas.length) {
                        tableTextareas[item.index].value = item.value;
                        // автонастройка высоты
                        tableTextareas[item.index].style.height = 'auto';
                        tableTextareas[item.index].style.height = tableTextareas[item.index].scrollHeight + 'px';
                    }
                });
            } catch(e) { console.warn(e); }
        }

        function saveAll() {
            saveSpellSlots();
            saveTableCheckboxes();
            saveTableTexts();
        }

        function loadAll() {
            loadSpellSlots();
            loadTableCheckboxes();
            loadTableTexts();
        }

        // ---------- 4. НАВЕШИВАНИЕ СОБЫТИЙ НА ТАБЛИЦУ (динамически) ----------
        function attachTableEvents() {
            refreshTableElements();
            tableCheckboxes.forEach(cb => {
                // удаляем старые обработчики, чтобы не дублировать
                cb.removeEventListener('click', checkboxClickHandler);
                cb.addEventListener('click', checkboxClickHandler);
            });
            tableTextareas.forEach(ta => {
                ta.removeEventListener('input', textareaInputHandler);
                ta.addEventListener('input', textareaInputHandler);
                // начальная высота
                ta.style.height = '35px';
                ta.style.overflowY = 'auto';
                if (ta.value) {
                    ta.style.height = 'auto';
                    ta.style.height = ta.scrollHeight + 'px';
                }
            });
        }

        function checkboxClickHandler(e) {
            e.stopPropagation();
            this.classList.toggle('checked');
            saveAll();
        }

        function textareaInputHandler() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            saveAll();
        }

        // первичный вызов событий
        attachTableEvents();

        // при изменениях DOM (если нужно перестроить) используем MutationObserver не требуется, просто обновим при сбросе.
        // но также при загрузке страницы после loadAll()
        
        // ---------- 5. КНОПКИ СБРОСА (на верху блоков) ----------
        const resetSpellBtn = document.getElementById('resetSpellBtnTop');
        if (resetSpellBtn) {
            resetSpellBtn.addEventListener('click', () => {
                // сброс всех слотов заклинаний
                document.querySelectorAll('#spellTracker .slot').forEach(slot => {
                    slot.classList.remove('checked');
                });
                saveAll();
            });
        }

        const resetTableBtn = document.getElementById('resetTableBtnTop');
        if (resetTableBtn) {
            resetTableBtn.addEventListener('click', () => {
                refreshTableElements();
                tableCheckboxes.forEach(cb => cb.classList.remove('checked'));
                tableTextareas.forEach(ta => {
                    ta.value = '';
                    ta.style.height = '35px';
                });
                saveAll();
            });
        }

        // ---------- 6. ЗАГРУЗКА ДАННЫХ ПРИ СТАРТЕ ----------
        loadAll();
        
        // небольшая синхронизация: после загрузки текстовых полей подстроить высоту
        setTimeout(() => {
            refreshTableElements();
            tableTextareas.forEach(ta => {
                if (ta.value.trim() !== '') {
                    ta.style.height = 'auto';
                    ta.style.height = ta.scrollHeight + 'px';
                } else {
                    ta.style.height = '35px';
                }
            });
        }, 20);

        // При изменении размера окна (если текст переносится) пересчитаем высоту для всех textarea (опционально)
        window.addEventListener('resize', () => {
            refreshTableElements();
            tableTextareas.forEach(ta => {
                if (ta.value) {
                    ta.style.height = 'auto';
                    ta.style.height = ta.scrollHeight + 'px';
                }
            });
        });
        
        // для гарантии, что если таблица перерисуется динамически (не планируется) — но нет, всё стабильно
        // также, если кто-то захочет через консоль добавить строки — не поддерживается, но структура фиксирована.
        // дополнительно: обновляем ссылки на элементы при возможном изменении (например сброс не пересоздаёт dom, всё ок)
        function syncTableReferences() {
            refreshTableElements();
            attachTableEvents();
        }
        
        // если понадобится перепривязка при любых внешних манипуляциях — но в коде нет мутаций,
        // оставим для подстраховки вызов после загрузки.
        syncTableReferences();
    })();
</script>
</body>
</html>
